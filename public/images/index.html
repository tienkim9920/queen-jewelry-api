<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Hình Ảnh (Client-Side)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .image-card {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4">Quản lý Thư viện Hình Ảnh</h1>

        <div class="card p-4 mb-5 shadow-sm mx-auto" style="max-width: 500px;">
            <h5 class="card-title mb-3">Tải ảnh mới lên</h5>
            <form id="uploadForm">
                <div class="mb-3">
                    <input class="form-control" type="file" id="imageInput" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="uploadBtn">Upload Ảnh</button>
            </form>
        </div>

        <h3 class="mb-3">Danh sách hình ảnh hiện có</h3>
        <div class="row g-4" id="imageGrid">
        </div>
    </div>

    <script>
        const API_URL = '/api/images';
        const imageGrid = document.getElementById('imageGrid');
        const uploadForm = document.getElementById('uploadForm');
        const imageInput = document.getElementById('imageInput');
        const uploadBtn = document.getElementById('uploadBtn');

        // 1. Hàm lấy danh sách ảnh từ API và hiển thị lên giao diện
        async function loadImages() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (!result.success) {
                    imageGrid.innerHTML = `<div class="alert alert-danger w-100 text-center">${result.message}</div>`;
                    return;
                }

                const images = result.data;
                if (images.length === 0) {
                    imageGrid.innerHTML = `<div class="alert alert-warning w-100 text-center">Thư mục trống. Hãy tải lên hình ảnh đầu tiên!</div>`;
                    return;
                }

                // Vẽ cấu trúc HTML cho từng bức ảnh
                imageGrid.innerHTML = images.map(img => `
                    <div class="col-6 col-md-4 col-lg-3" id="img-card-${btoa(img.filename).replace(/=/g, '')}">
                        <div class="card h-100 shadow-sm">
                            <img src="${img.url}" class="card-img-top image-card" alt="Image">
                            <div class="card-body p-2 d-flex flex-column justify-content-end">
                                <p class="text-muted text-truncate small mb-2" title="${img.filename}">${img.filename}</p>
                                
                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-primary flex-grow-1" style="padding: .15rem .4rem; font-size: .75rem; border-radius: .2rem;" onclick="copyToClipboard('${img.url}', this)">
                                        Copy URL
                                    </button>
                                    <button class="btn btn-danger btn-sm flex-grow-1" onclick="deleteImage('${img.filename}')">
                                        Xóa
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

                // BỔ SUNG: Hàm xử lý copy URL vào bộ nhớ đệm (Clipboard) kèm hiệu ứng đổi chữ thông báo
                async function copyToClipboard(url, button) {
                    try {
                        await navigator.clipboard.writeText(url);

                        // Tạo hiệu ứng đổi chữ trên nút để người dùng biết đã copy thành công
                        const originalText = button.innerText;
                        button.innerText = 'Copied!';
                        button.classList.replace('btn-outline-primary', 'btn-success');
                        button.disabled = true;

                        // Trả lại trạng thái nút ban đầu sau 1.5 giây
                        setTimeout(() => {
                            button.innerText = originalText;
                            button.classList.replace('btn-success', 'btn-outline-primary');
                            button.disabled = false;
                        }, 1500);

                    } catch (err) {
                        console.error('Không thể copy URL: ', err);
                        alert('Lỗi khi copy URL, vui lòng thử lại.');
                    }
                }

            } catch (error) {
                console.error('Lỗi khi tải danh sách ảnh:', error);
                imageGrid.innerHTML = `<div class="alert alert-danger w-100 text-center">Không thể kết nối đến Server API.</div>`;
            }
        }

        // 2. Xử lý sự kiện Upload hình ảnh mới bằng Form-Data
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = imageInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file); // 'image' phải trùng với cấu trúc upload.single('image') bên backend

            uploadBtn.disabled = true;
            uploadBtn.innerText = 'Đang upload...';

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    alert('Tải ảnh lên thành công!');
                    uploadForm.reset();
                    loadImages(); // Tải lại danh sách ảnh mới
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (error) {
                console.error('Lỗi upload:', error);
                alert('Có lỗi xảy ra trong quá trình upload file.');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerText = 'Upload Ảnh';
            }
        });

        // 3. Hàm gọi API Xóa hình ảnh theo filename
        async function deleteImage(filename) {
            if (!confirm('Bạn có chắc chắn muốn xóa hình ảnh này không?')) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ filename }) // Truyền filename vào JSON body
                });
                const result = await response.json();

                if (result.success) {
                    alert('Đã xóa ảnh thành công!');
                    loadImages(); // Làm mới danh sách hiển thị
                } else {
                    alert('Lỗi khi xóa: ' + result.message);
                }
            } catch (error) {
                console.error('Lỗi xóa ảnh:', error);
                alert('Không thể thực hiện yêu cầu xóa ảnh.');
            }
        }

        // Tự động chạy và tải ảnh ngay khi trang được load xong
        document.addEventListener('DOMContentLoaded', loadImages);
    </script>
</body>

</html>
