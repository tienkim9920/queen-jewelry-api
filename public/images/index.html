<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Hình Ảnh (Client-Side)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .image-card {
            height: 200px;
            object-fit: cover;
            width: 100%;
            border-bottom: 1px solid #e9ecef;
        }

        .card-gallery {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card-gallery:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1) !important;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 fw-bold text-primary">Quản lý Thư viện Hình Ảnh</h1>

        <div class="card p-4 mb-5 shadow-sm mx-auto" style="max-width: 500px; border-radius: 12px;">
            <h5 class="card-title mb-3 fw-semibold">Tải ảnh mới lên</h5>
            <form id="uploadForm">
                <div class="mb-3">
                    <input class="form-control" type="file" id="imageInput" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-medium" id="uploadBtn">Upload Ảnh</button>
            </form>
        </div>

        <h3 class="mb-4 fw-semibold text-secondary">Danh sách hình ảnh hiện có</h3>
        <div class="row g-4" id="imageGrid">
            <div class="text-center w-100 py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/images';
        const imageGrid = document.getElementById('imageGrid');
        const uploadForm = document.getElementById('uploadForm');
        const imageInput = document.getElementById('imageInput');
        const uploadBtn = document.getElementById('uploadBtn');

        // 1. Hàm lấy danh sách ảnh từ API và hiển thị lên giao diện
        async function loadImages() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (!result.success) {
                    imageGrid.innerHTML = `<div class="alert alert-danger w-100 text-center">${result.message}</div>`;
                    return;
                }

                const images = result.data;
                if (images.length === 0) {
                    imageGrid.innerHTML = `
                        <div class="col-10 mx-auto text-center py-5">
                            <div class="alert alert-warning">Thư mục trống. Hãy tải lên hình ảnh đầu tiên!</div>
                        </div>`;
                    return;
                }

                // Vẽ cấu trúc HTML cho từng bức ảnh
                imageGrid.innerHTML = images.map(img => `
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3" id="img-card-${btoa(img.filename).replace(/=/g, '')}">
                        <div class="card h-100 shadow-sm card-gallery border-0">
                            <img src="${img.url}" class="card-img-top image-card" alt="Image" loading="lazy">
                            <div class="card-body p-3 d-flex flex-column justify-content-between">
                                <p class="text-dark fw-medium text-truncate small mb-3" title="${img.filename}">${img.filename}</p>
                                
                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-primary btn-sm flex-grow-1 fw-medium" onclick="copyToClipboard('${img.url}', this)">
                                        Copy URL
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm" onclick="deleteImage('${img.filename}')" title="Xóa ảnh">
                                        Xóa
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Lỗi khi tải danh sách ảnh:', error);
                imageGrid.innerHTML = `<div class="alert alert-danger w-100 text-center">Không thể kết nối đến Server API.</div>`;
            }
        }

        // ĐƯỢC ĐƯA RA NGOÀI: Hàm xử lý copy URL vào bộ nhớ đệm (Clipboard) toàn cục
        async function copyToClipboard(url, button) {
            try {
                // Giải pháp fallback nếu navigator.clipboard không chạy ở môi trường HTTP thường
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(url);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = url;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }

                // Tạo hiệu ứng đổi chữ trên nút
                const originalText = button.innerText;
                button.innerText = '✓ Copied!';
                button.classList.replace('btn-outline-primary', 'btn-success');
                button.disabled = true;

                // Trả lại trạng thái nút ban đầu sau 1.5 giây
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.replace('btn-success', 'btn-outline-primary');
                    button.disabled = false;
                }, 1500);

            } catch (err) {
                console.error('Không thể copy URL: ', err);
                alert('Lỗi khi copy URL, vui lòng thử lại.');
            }
        }

        // 2. Xử lý sự kiện Upload hình ảnh mới bằng Form-Data
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = imageInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);

            uploadBtn.disabled = true;
            uploadBtn.innerText = 'Đang upload...';

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    uploadForm.reset();
                    loadImages(); // Tải lại danh sách ảnh mới
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (error) {
                console.error('Lỗi upload:', error);
                alert('Có lỗi xảy ra trong quá trình upload file.');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerText = 'Upload Ảnh';
            }
        });

        // 3. Hàm gọi API Xóa hình ảnh theo filename
        async function deleteImage(filename) {
            if (!confirm('Bạn có chắc chắn muốn xóa hình ảnh này không?')) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ filename })
                });
                const result = await response.json();

                if (result.success) {
                    loadImages(); // Làm mới danh sách hiển thị
                } else {
                    alert('Lỗi khi xóa: ' + result.message);
                }
            } catch (error) {
                console.error('Lỗi xóa ảnh:', error);
                alert('Không thể thực hiện yêu cầu xóa ảnh.');
            }
        }

        // Tự động chạy và tải ảnh ngay khi trang được load xong
        document.addEventListener('DOMContentLoaded', loadImages);
    </script>
</body>

</html>
