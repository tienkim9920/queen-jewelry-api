<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Server Area</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-slate-100 flex items-center justify-center min-h-screen font-sans p-4">

    <div
        class="max-w-md w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-8 shadow-xl backdrop-blur-sm text-center relative overflow-hidden">

        <div
            class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-[2px] bg-gradient-to-r from-transparent via-emerald-500 to-transparent shadow-[0_0_20px_rgba(16,185,129,0.5)]">
        </div>

        <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 mb-6 shadow-[0_0_15px_rgba(16,185,129,0.1)]">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke-currentColor="https://raw.githubusercontent.com/tailwindlabs/heroicons/master/optimized/24/outline/cpu-chip.svg"
                class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-white tracking-wide mb-3">
            ADMIN SERVER AREA
        </h1>

        <p class="text-slate-400 text-sm leading-relaxed mb-6">
            Bạn đang truy cập vào cổng quản trị hệ thống backend. Mọi thao tác tại đây đều ảnh hưởng trực tiếp đến cấu
            hình và cơ sở dữ liệu của server.
        </p>

        <div class="bg-slate-900/60 border border-slate-700/50 rounded-xl p-4 mb-6 text-left space-y-2">
            <div class="flex justify-between text-xs">
                <span class="text-slate-500">Môi trường:</span>
                <span class="font-mono text-emerald-400 bg-emerald-500/10 px-1.5 py-0.5 rounded">Production</span>
            </div>
            <div class="flex justify-between text-xs">
                <span class="text-slate-500">Yêu cầu quyền:</span>
                <span class="text-slate-300 font-medium">Root / Administrator</span>
            </div>
        </div>

        <p class="text-[11px] text-slate-600 mt-6 font-mono">
            Secure Connection • TLS 1.3
        </p>
    </div>

</body>

</html>
